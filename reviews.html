<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>آراء الطلاب</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent-color: #00D1FF;
  --bg-color: #0B0F19;
  --glass-bg: rgba(22, 27, 34, 0.7);
  --text-gray: #94A3B8;
  --border-color: rgba(0, 209, 255, 0.2);
}

body {
  font-family: 'Cairo', sans-serif;
  background-color: var(--bg-color);
  color: white;
  direction: rtl;
  padding: 20px;
}

.reviews-wrapper { padding: 1.5rem 0; }

.reviews-header { text-align: center; margin-bottom: 2rem; }

.reviews-header h2 {
  font-size: 22px;
  font-weight: 500;
  color: white;
  margin-bottom: 6px;
}

.reviews-header p { font-size: 14px; color: var(--text-gray); }

.stars-row {
  display: flex;
  justify-content: center;
  gap: 4px;
  margin: 10px 0;
}

.star { color: #F59E0B; font-size: 18px; }

.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 2rem;
}

.stat-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 1rem;
  text-align: center;
}

.stat-num {
  font-size: 24px;
  font-weight: 500;
  color: var(--accent-color);
}

.stat-label {
  font-size: 12px;
  color: var(--text-gray);
  margin-top: 4px;
}

.filter-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
  justify-content: center;
}

.filter-btn {
  font-size: 12px;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid rgba(0,209,255,0.3);
  background: rgba(255,255,255,0.05);
  color: var(--text-gray);
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Cairo', sans-serif;
}

.filter-btn:hover, .filter-btn.active {
  background: rgba(0,209,255,0.15);
  color: var(--accent-color);
  border-color: var(--accent-color);
}

.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
  margin-bottom: 1.5rem;
}

.review-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  padding: 1rem 1.25rem;
  transition: border-color 0.2s;
}

.review-card:hover { border-color: var(--accent-color); }

.review-card.featured {
  border: 1px solid rgba(0,209,255,0.6);
  background: rgba(0,209,255,0.07);
}

.card-top {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: rgba(0,209,255,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 500;
  font-size: 14px;
  color: var(--accent-color);
  flex-shrink: 0;
  overflow: hidden;
  border: 1.5px solid rgba(0,209,255,0.4);
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
}

.avatar img.loaded { display: block; }

.student-info { flex: 1; min-width: 0; }

.student-name {
  font-size: 14px;
  font-weight: 500;
  color: white;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.course-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  background: rgba(16,185,129,0.15);
  color: #10B981;
  border: 1px solid rgba(16,185,129,0.3);
  display: inline-block;
  margin-top: 2px;
}

.card-stars {
  display: flex;
  gap: 2px;
  margin-bottom: 8px;
}

.card-star { color: #F59E0B; font-size: 13px; }

.review-quote {
  color: var(--accent-color);
  font-size: 20px;
  line-height: 1;
  margin-bottom: 4px;
  display: block;
}

.review-text {
  font-size: 13px;
  color: var(--text-gray);
  line-height: 1.7;
}

.load-more-btn {
  display: block;
  margin: 1.5rem auto 0;
  padding: 10px 32px;
  border-radius: 20px;
  border: 1px solid rgba(0,209,255,0.3);
  background: transparent;
  color: var(--text-gray);
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  transition: all 0.2s;
}

.load-more-btn:hover {
  background: rgba(0,209,255,0.15);
  color: var(--accent-color);
  border-color: var(--accent-color);
}

.section-title {
  font-size: 16px;
  font-weight: 500;
  color: white;
  margin: 1.5rem 0 1rem;
  padding-right: 10px;
  border-right: 3px solid var(--accent-color);
}

.notification-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  background: #FF5252;
  border-radius: 50%;
  margin-left: 6px;
  animation: pulse-dot 2s infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

.photo-section-label {
  font-size: 13px;
  color: var(--text-gray);
  text-align: center;
  margin: 8px 0 12px;
}

.photo-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
  gap: 8px;
  margin-top: 0.5rem;
}

.photo-thumb {
  width: 100%;
  aspect-ratio: 1;
  border-radius: 8px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border-color);
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s;
}

.photo-thumb:hover { border-color: var(--accent-color); }

.photo-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Lightbox */
.lightbox {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.92);
  z-index: 9999;
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(8px);
}

.lightbox.open { display: flex; }

.lightbox img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 12px;
  border: 1px solid rgba(0,209,255,0.3);
}

.lightbox-close {
  position: fixed;
  top: 20px;
  left: 20px;
  font-size: 36px;
  color: white;
  cursor: pointer;
  line-height: 1;
  background: none;
  border: none;
}
</style>
</head>

  <div class="reviews-grid" id="reviewsGrid"></div>

  <div class="section-title">

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="صورة الطالب">
</div>

let visibleCount = 6;
let currentFilter = 'all';

function getInitials(name) {
  const parts = name.trim().split(' ');
  return parts.length >= 2 ? parts[0][0] + parts[1][0] : parts[0][0];
}

function renderCards() {
  const grid = document.getElementById('reviewsGrid');
  const filtered = currentFilter === 'all' ? reviews : reviews.filter(r => r.course_key === currentFilter);
  const visible = filtered.slice(0, visibleCount);

  grid.innerHTML = visible.map(r => `
    <div class="review-card ${r.featured ? 'featured' : ''}">
      <div class="card-top">
        <div class="avatar">
          <img src="images/${r.img}.jpg" alt="${r.name}"
            onload="this.classList.add('loaded'); this.nextElementSibling.style.display='none'"
            onerror="">
          <span style="font-size:13px;font-weight:500;">${getInitials(r.name)}</span>
        </div>
        <div class="student-info">
          <div class="student-name">${r.name}</div>
          <span class="course-badge">${r.course}</span>
        </div>
      </div>
      <div class="card-stars">${'★★★★★'.split('').map(() => '<span class="card-star">★</span>').join('')}</div>
      <span class="review-quote">"</span>
      <p class="review-text">${r.text}</p>
    </div>
  `).join('');

  document.getElementById('loadMoreBtn').style.display = filtered.length <= visibleCount ? 'none' : 'block';
}

function filterReviews(key, btn) {
  currentFilter = key;
  visibleCount = 6;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function loadMore() {
  visibleCount += 6;
  renderCards();
}

function buildPhotoGrid() {
  const grid = document.getElementById('photoGrid');
  const photos = Array.from({length: 60}, (_, i) => i + 1);
  grid.innerHTML = photos.map(n => `
    <div class="photo-thumb" onclick="openLightbox('images/${n}.jpg')">
      <img src="images/${n}.jpg" alt="رأي طالب ${n}" onerror="this.parentElement.style.display='none'">
    </div>
  `).join('');
}

function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}

renderCards();
buildPhotoGrid();
</script>
